services:
  - type: web
    name: keizai-sentence-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 1 --threads 2
    disk:
      name: keizai-sentence-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # チャンネル別キー（任意）: 設定すると該当チャンネルが優先使用。未設定なら上の共通キーにフォールバック。
      # 経済探求ラボ = KEIZAI_*, ロシア解体新書 = ROSHIA_*
      - key: KEIZAI_ANTHROPIC_API_KEY
        sync: false
      - key: KEIZAI_GEMINI_API_KEY
        sync: false
      - key: KEIZAI_OPENAI_API_KEY
        sync: false
      - key: ROSHIA_ANTHROPIC_API_KEY
        sync: false
      - key: ROSHIA_GEMINI_API_KEY
        sync: false
      - key: ROSHIA_OPENAI_API_KEY
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: "gpt-image-2"
      - key: GEMINI_IMAGE_MODEL
        value: "gemini-3.1-flash-image-preview"
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
